<div *ngIf="loading" class="loading">
    Loading...
  </div>
  
  <div *ngIf="errorMessage" class="error">
    {{ errorMessage }}
  </div>
  
  <div *ngIf="stats" class="stats-container">
  
    <div class="stat-card">
      <p class="stat-label">Total Users</p>
      <h3 class="stat-value">{{ stats.total_users }}</h3>
    </div>
  
    <div class="stat-card">
      <p class="stat-label">Active Jobs</p>
      <h3 class="stat-value">{{ stats.active_jobs }}</h3>
    </div>
  
    <div class="stat-card">
      <p class="stat-label">Total Value</p>
      <h3 class="stat-value">${{ stats.total_value_moved }}</h3>
    </div>
  
  </div>
