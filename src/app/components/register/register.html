<h2>REGISTER</h2>
<form (ngSubmit)="submit()">
  <label>
    Name
    <input [(ngModel)]="name" name="name" type="text" />
  </label>
  <label>
    Username
    <input [(ngModel)]="username" name="username" type="text" />
  </label>
  <label>
    Email
    <input [(ngModel)]="email" name="email" type="email" />
  </label>
  <label>
    Password
    <input [(ngModel)]="password" name="password" type="password" />
  </label>
  <label>
    Bio
    <input [(ngModel)]="bio" name="bio" type="text" />
  </label>
  <label>
    Skills
    <input [(ngModel)]="skill" name="skill" type="text" />
  </label>

  <button type="button" (click)="addSkill()">Add Skill</button>

  <ul>
    <li *ngFor="let skill of skills">
      {{ skill }}
    </li>
  </ul>

  <div *ngIf="errorMessage" class="error">
    {{errorMessage}}
  </div>

  <div *ngIf="suggestedUsername" class="suggestion">
    Suggested username: {{ suggestedUsername }}
  </div>

  <button type="submit">Create</button>

  <p>Already have an account? <a routerLink="/login">Login</a></p>
</form>
